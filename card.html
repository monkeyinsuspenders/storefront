<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customize Product - Penn Fakes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    .navbar {
      background: #0b0b0b;
      border-bottom: 1px solid #1f1f1f;
    }

    .navbar-brand {
      font-weight: 700;
      letter-spacing: 1px;
    }

    .panel {
      background: #111111;
      border: 1px solid #1f1f1f;
      border-radius: 14px;
    }

    .form-control,
    .form-select {
      background: #181818;
      color: white;
      border: 1px solid #2a2a2a;
    }

    .form-control:focus,
    .form-select:focus {
      background: #181818;
      color: white;
      border-color: #555;
      box-shadow: none;
    }

    .form-control::placeholder {
      color: #8a8a8a;
    }

    .form-label {
      color: #d0d0d0;
      font-weight: 600;
      margin-bottom: 0.45rem;
    }

    .muted {
      color: #9a9a9a;
    }

    .btn-custom {
      background: white;
      color: black;
      border: none;
      font-weight: 600;
      border-radius: 999px;
      padding: 10px 18px;
    }

    .btn-custom:hover {
      background: #dddddd;
      color: black;
    }

    .btn-outline-light {
      border-radius: 999px;
      padding: 10px 18px;
    }
    
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container py-3">
      <a class="navbar-brand text-white text-decoration-none" href="index.html">Penn Fakes</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row g-4">
      <div class="col-lg-12">
        <div class="panel p-4">
          <h1 class="h3 mb-2" id="pageHeading">Customize Product</h1>
          <p class="muted mb-4">$85 • Made to order</p>

          <div class="text-center mb-4">
            <img
              id="productImage"
              class="img-fluid rounded"
              style="max-width: 400px;"
              alt="Selected product"
            >
          </div>

          <form id="badgeForm">
            <input type="hidden" id="selectedProduct" name="selectedProduct">

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="sample1">First Name *</label>
                <input type="text" class="form-control" id="sample1" required>
              </div>

              <div class="col-md-6">
                <label class="form-label" for="sample2">Middle Name</label>
                <input type="text" class="form-control" id="sample2">
              </div>
            </div>

            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label class="form-label" for="sample3">Last Name *</label>
                <input type="text" class="form-control" id="sample3" required>
              </div>

              <div class="col-md-6">
                <label class="form-label" for="sample4">Gender *</label>
                <select class="form-select" id="sample4" required>
                  <option value="" selected disabled>Select an option</option>
                  <option>Male</option>
                  <option>Female</option>
                </select>
              </div>
            </div>

            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label class="form-label" for="sample5">Eye Color *</label>
                <select class="form-select" id="sample5" required>
                  <option value="" selected disabled>Select an option</option>
                  <option>BRN (Brown)</option>
                  <option>GRN (Green)</option>
                  <option>HAZ (Hazel)</option>
                  <option>BLU (Blue)</option>
                  <option>BLK (Black)</option>
                  <option>GRY (Gray)</option>
                  <option>SDY (Sandy)</option>
                  <option>MUL (Multicolor)</option>
                </select>
              </div>
            
              <div class="col-md-6">
                <label class="form-label" for="sample6">Eye Color *</label>
                <select class="form-select" id="sample6" required>
                  <option value="" selected disabled>Select an option</option>
                  <option>BLK (Black)</option>
                  <option>BRN (Brown)</option>
                  <option>RED (Red)</option>
                  <option>BAL (Bald)</option>
                  <option>BLN (Blonde)</option>
                  <option>GRY (Gray)</option>
                </select>
              </div>
            </div>
            
            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label class="form-label" for="sample7">Birthday for ID *</label>
                <input type="date" class="form-control" id="sample7" required>
              </div>
            
              <div class="col-md-6">
                <label class="form-label" for="sample8">Height *</label>
                <select class="form-select" id="sample8" required>
                  <option value="" selected disabled>Select an option</option>
                  <option>5'0"</option>
                  <option>5'1"</option>
                  <option>5'2"</option>
                  <option>5'3"</option>
                  <option>5'4"</option>
                  <option>5'5"</option>
                  <option>5'6"</option>
                  <option>5'7"</option>
                  <option>5'8"</option>
                  <option>5'9"</option>
                  <option>5'10"</option>
                  <option>5'11"</option>
                  <option>6'0"</option>
                  <option>6'1"</option>
                  <option>6'2"</option>
                  <option>6'3"</option>
                  <option>6'4"</option>
                  <option>6'5"</option>
                  <option>6'6"</option>
                  <option>6'7"</option>
                  <option>6'8"</option>
                  <option>6'9"</option>
                  <option>6'10"</option>
                  <option>6'11"</option>
                  <option>7'0"</option>
                </select>
              </div>
            </div>
            
            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label class="form-label" for="sample9">Weight *</label>
                <input type="number" class="form-control" id="sample9" min="10" max="999" step="1" required>
              </div>
            
              <div class="col-md-6">
                <label class="form-label" for="sample10">Street Address for ID</label>
                <input type="text" class="form-control" id="sample10">
              </div>
            </div>
            
            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label class="form-label" for="sample11">City for ID</label>
                <input type="text" class="form-control" id="sample11" required>
              </div>
            
              <div class="col-md-6">
                <label class="form-label" for="sample12">Zip Code for ID</label>
                <input type="number" class="form-control" id="sample12" step="1" required>
              </div>
            </div>
            
            <div class="row g-3 mt-1">
              <div class="col-md-4">
                <label class="form-label" for="sample13">Restrictions (Corrective Lenses) *</label>
                <select class="form-select" id="sample13" required>
                  <option value="" selected disabled>Select an option</option>
                  <option>No</option>
                  <option>Yes</option>
                </select>
              </div>
            
              <div class="col-md-4">
                <label class="form-label" for="sample14">Organ Donor *</label>
                <select class="form-select" id="sample14" required>
                  <option value="" selected disabled>Select an option</option>
                  <option>Yes</option>
                  <option>No</option>
                </select>
              </div>
            
              <div class="col-md-4">
                <label class="form-label" for="sample15">Sample *</label>
                <select class="form-select" id="sample15" required>
                  <option value="" selected disabled>Select an option</option>
                  <option>1 (Free)</option>
                  <option>2 ($25)</option>
                  <option>3 ($40)</option>
                </select>
              </div>
            </div>
            
            <div class="mt-3">
              <label class="form-label" for="headshotUpload">Photo Upload *</label>
              <input type="file" class="form-control" id="headshotUpload" accept="image/*" required>
            </div>
            
            <div class="mt-3">
              <label class="form-label" for="logoUpload">Photo of Signature Upload</label>
              <input type="file" class="form-control" id="logoUpload" accept="image/*">
            </div>
            <div class="mt-3">
              <label class="form-label" for="notes">Order Notes</label>
              <textarea class="form-control" id="notes" rows="4" placeholder="Any badge design notes or requests"></textarea>
            </div>

            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-custom">Add to Cart</button>
              <a href="index.html" class="btn btn-outline-light">Back</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const rawProduct = params.get("product") || "arizona";

    function toTitleCase(slug) {
      return slug
        .split("-")
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
    }

    const allowedProducts = [
      "arizona",
      "colorado",
      "indiana",
      "michigan",
      "mississippi",
      "tennessee",
      "vermont"
    ];

    const product = allowedProducts.includes(rawProduct) ? rawProduct : "arizona";
    const productName = toTitleCase(product);
    const productImagePath = "images/" + product + ".jpg";

    document.title = "Customize " + productName + " - Penn Fakes";
    document.getElementById("pageHeading").textContent = "Customize " + productName;

    const imageElement = document.getElementById("productImage");
    imageElement.src = productImagePath;
    imageElement.alt = productName;

    document.getElementById("selectedProduct").value = productName;

    imageElement.addEventListener("error", function () {
      imageElement.src = "https://via.placeholder.com/400x260?text=" + encodeURIComponent(productName);
    });

    document.getElementById("badgeForm").addEventListener("submit", function (e) {
      e.preventDefault();
      alert("Form captured for " + productName + ". Next step is wiring this to a cart or checkout.");
    });
  </script>
</body>
</html>
